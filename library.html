<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ห้องสมุด บก.กฝ.ฯ</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  * { box-sizing: border-box; }
  body { font-family:'Sarabun', sans-serif; background:#f4f6f8; margin:0; padding:16px; }
  h1 { font-size:18px; color:#1f2d3d; margin:0 0 12px; text-align:center; }
  .searchBar { position:sticky; top:0; background:#f4f6f8; padding-bottom:10px; z-index:5; }
  input[type=text] { width:100%; padding:12px 14px; border:1px solid #d1d5db; border-radius:10px; font-size:15px; font-family:inherit; }
  .chips { display:flex; gap:8px; overflow-x:auto; margin-top:10px; padding-bottom:4px; }
  .chip { flex:0 0 auto; padding:6px 14px; background:#fff; border:1px solid #ddd; border-radius:20px; font-size:13px; cursor:pointer; white-space:nowrap; }
  .chip.active { background:#2563eb; color:#fff; border-color:#2563eb; }
  .list { margin-top:14px; display:flex; flex-direction:column; gap:10px; }
  .book-card { background:#fff; border-radius:12px; padding:14px 16px; box-shadow:0 1px 3px rgba(0,0,0,.07); display:flex; align-items:center; gap:12px; cursor:pointer; }
  .book-icon { font-size:28px; }
  .book-info { flex:1; min-width:0; }
  .book-name { font-size:15px; color:#1f2d3d; font-weight:600; }
  .book-cat { font-size:12px; color:#6b7280; margin-top:2px; }
  .empty { text-align:center; color:#94a3b8; padding:40px 0; font-size:14px; }
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; align-items:center; justify-content:center; padding:20px; }
  .overlay.show { display:flex; }
  .modal { background:#fff; border-radius:14px; padding:24px; max-width:360px; width:100%; text-align:center; }
  .modal h3 { margin-top:0; font-size:16px; }
  .modal button { margin-top:16px; width:100%; padding:12px; border:none; border-radius:8px; font-size:15px; cursor:pointer; }
  .btn-primary { background:#2563eb; color:#fff; }
  .btn-secondary { background:#e5e7eb; color:#374151; margin-top:8px; }
  .status { text-align:center; font-size:13px; color:#94a3b8; margin-top:10px; }
</style>
</head>
<body>

<h1>📚 ห้องสมุด บก.กฝ.ฯ</h1>

<div class="searchBar">
  <input type="text" id="searchInput" placeholder="ค้นหาชื่อตำรา...">
  <div class="chips" id="chips"></div>
</div>

<div class="list" id="bookList"></div>
<div class="status" id="status">กำลังโหลดรายการตำรา...</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <p id="modalText" style="font-size:14px;color:#6b7280;"></p>
    <button class="btn-primary" id="modalBtn">เปิดเอกสาร</button>
    <button class="btn-secondary" onclick="closeModal()">ปิด</button>
  </div>
</div>

<script>
// ===== แก้ 2 ค่านี้ให้ตรงกับของจริง =====
const LIFF_ID = "2010475148-LQlGAUHC";
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbynXfXhYm2HSsx7IeLC3AnQEqv7LC7lqb9TxyoFbqNWbH_-SDl_-Km-GgQAqqTEPf6Z/exec"; // ลงท้าย /exec
// =========================================

let userId = null;
let allBooks = [];
let activeCategory = 'ทั้งหมด';

async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) {
      liff.login({ redirectUri: window.location.href });
      return;
    }
    const profile = await liff.getProfile();
    userId = profile.userId;
    loadCatalog();
  } catch (err) {
    document.getElementById('status').innerText = 'เชื่อมต่อ LINE ไม่ได้: ' + err;
  }
}

async function loadCatalog() {
  try {
    const res = await fetch(WEBAPP_URL + '?action=catalog');
    const data = await res.json();
    if (data.status !== 'ok') throw new Error(data.message || 'load failed');
    allBooks = data.books;
    renderChips();
    renderList();
    document.getElementById('status').innerText = '';
  } catch (err) {
    document.getElementById('status').innerText = 'โหลดรายการตำราไม่สำเร็จ: ' + err;
  }
}

function renderChips() {
  const categories = ['ทั้งหมด', ...new Set(allBooks.map(b => b.category || 'ทั่วไป'))];
  const chipsEl = document.getElementById('chips');
  chipsEl.innerHTML = '';
  categories.forEach(c => {
    const chip = document.createElement('div');
    chip.className = 'chip' + (c === activeCategory ? ' active' : '');
    chip.innerText = c;
    chip.onclick = function() {
      activeCategory = c;
      renderChips();
      renderList();
    };
    chipsEl.appendChild(chip);
  });
}

function renderList() {
  const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
  const listEl = document.getElementById('bookList');
  listEl.innerHTML = '';

  const filtered = allBooks.filter(b => {
    const matchCategory = activeCategory === 'ทั้งหมด' || (b.category || 'ทั่วไป') === activeCategory;
    const matchKeyword = !keyword || b.bookName.toLowerCase().includes(keyword);
    return matchCategory && matchKeyword;
  });

  if (filtered.length === 0) {
    listEl.innerHTML = '<div class="empty">ไม่พบตำราที่ค้นหา</div>';
    return;
  }

  filtered.forEach(b => {
    const card = document.createElement('div');
    card.className = 'book-card';
    card.innerHTML =
      '<div class="book-icon">📖</div>' +
      '<div class="book-info">' +
        '<div class="book-name">' + escapeHtml(b.bookName) + '</div>' +
        '<div class="book-cat">' + escapeHtml(b.category || 'ทั่วไป') + '</div>' +
      '</div>';
    card.onclick = function() { openModal(b); };
    listEl.appendChild(card);
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, function(c) {
    return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
  });
}

let selectedBook = null;
function openModal(book) {
  selectedBook = book;
  document.getElementById('modalTitle').innerText = book.bookName;
  document.getElementById('modalText').innerText = 'ต้องการรับเอกสารเล่มนี้หรือไม่?';
  document.getElementById('modalBtn').innerText = 'ขอเอกสาร';
  document.getElementById('modalBtn').onclick = requestBook;
  document.getElementById('overlay').classList.add('show');
}
function closeModal() {
  document.getElementById('overlay').classList.remove('show');
}

async function requestBook() {
  const btn = document.getElementById('modalBtn');
  btn.innerText = 'กำลังส่งคำขอ...';
  btn.disabled = true;
  try {
    const res = await fetch(WEBAPP_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'requestBook', userId: userId, bookId: selectedBook.bookId }),
    });
    const data = await res.json();
    if (data.status === 'ok') {
      document.getElementById('modalText').innerText = 'พร้อมเปิดอ่านแล้ว';
      btn.innerText = 'เปิดเอกสาร';
      btn.disabled = false;
      btn.onclick = function() { window.open(data.fileLink, '_blank'); };
    } else {
      document.getElementById('modalText').innerText = data.message || 'เกิดข้อผิดพลาด';
      btn.innerText = 'ลองใหม่';
      btn.disabled = false;
      btn.onclick = requestBook;
    }
  } catch (err) {
    document.getElementById('modalText').innerText = 'ส่งคำขอไม่สำเร็จ: ' + err;
    btn.disabled = false;
  }
}

document.getElementById('searchInput').addEventListener('input', renderList);

init();
</script>

</body>
</html>
