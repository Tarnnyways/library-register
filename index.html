<script>
// ===== แก้ 2 ค่านี้ให้ตรงกับของจริง =====
const LIFF_ID = "2010475148-OatT0hPT";
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbynXfXhYm2HSsx7IeLC3AnQEqv7LC7lqb9TxyoFbqNWbH_-SDl_-Km-GgQAqqTEPf6Z/exec"; // ลงท้าย /exec (ไม่ต้องมี ?page=register ต่อท้ายตรงนี้)
// =========================================

let userId = null;
let displayName = null;

async function init() {
  const timeoutMsg = setTimeout(function() {
    document.getElementById('msg').innerHTML =
      '<span class="error">เชื่อมต่อ LINE ช้าผิดปกติ — กรุณาปิดหน้านี้แล้วกดปุ่ม "ลงทะเบียน" ใหม่จากแชท LINE</span>';
  }, 8000);

  try {
    await liff.init({ liffId: LIFF_ID });
    clearTimeout(timeoutMsg);

    if (!liff.isLoggedIn()) {
      liff.login({ redirectUri: window.location.href });
      return;
    }

    const profile = await liff.getProfile();
    userId = profile.userId;
    displayName = profile.displayName;

    const btn = document.getElementById('submitBtn');
    btn.disabled = false;
    btn.innerText = 'ลงทะเบียน';
  } catch (err) {
    clearTimeout(timeoutMsg);
    document.getElementById('msg').innerHTML =
      '<span class="error">เชื่อมต่อ LINE ไม่ได้ (' + (err && err.message ? err.message : err) + ')</span>';
  }
}

async function submitForm() {
  const fullName = document.getElementById('fullName').value.trim();
  const position = document.getElementById('position').value.trim();
  const unit = document.getElementById('unit').value;
  const msgEl = document.getElementById('msg');

  if (!fullName || !position || !unit) {
    msgEl.innerHTML = '<span class="error">กรุณากรอกข้อมูลให้ครบทุกช่อง</span>';
    return;
  }
  if (!userId) {
    msgEl.innerHTML = '<span class="error">ไม่พบข้อมูลผู้ใช้ LINE กรุณาเปิดผ่านแอป LINE</span>';
    return;
  }

  document.getElementById('submitBtn').disabled = true;
  msgEl.innerHTML = 'กำลังบันทึก...';

  try {
    // ใช้ Content-Type: text/plain เพื่อเลี่ยง CORS preflight (Apps Script เว็บแอปไม่รองรับ preflight)
    const res = await fetch(WEBAPP_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        action: 'register',
        userId: userId,
        displayName: displayName,
        fullName: fullName,
        position: position,
        unit: unit,
      }),
    });
    const data = await res.json();

    if (data.status === 'ok') {
      msgEl.innerHTML = '<span class="success">ลงทะเบียนสำเร็จ ✅ ปิดหน้านี้แล้วกลับไปแชทได้เลย</span>';
      setTimeout(function() {
        if (liff.isInClient()) liff.closeWindow();
      }, 1500);
    } else {
      document.getElementById('submitBtn').disabled = false;
      msgEl.innerHTML = '<span class="error">' + (data.message || 'เกิดข้อผิดพลาด') + '</span>';
    }
  } catch (err) {
    document.getElementById('submitBtn').disabled = false;
    msgEl.innerHTML = '<span class="error">ส่งข้อมูลไม่สำเร็จ: ' + err + '</span>';
  }
}

init();
</script>
